services:
  - type: web
    name: hyper-mcp
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: HOST
        value: 0.0.0.0
      - key: HYPER_MCP_PGLITE_DIR
        value: /var/data/pgdata
      - key: HYPER_MCP_READONLY
        value: "false"
      - key: HYPER_MCP_ALLOW_DANGEROUS
        value: "false"
      # Auth
      - key: HYPER_MCP_AUTH_REQUIRED
        value: "true"
      - key: HYPER_MCP_TRUST_MODE
        value: hosted
      # Admin trust root — set ONE of the following in Render dashboard:
      #   HYPER_MCP_ADMIN_PUBLIC_JWK  (inline JWK JSON)
      #   HYPER_MCP_ADMIN_JWKS_URL   (JWKS endpoint URL)
      # Both require ISSUER and AUDIENCE below.
      - key: HYPER_MCP_ADMIN_ISSUER
        sync: false
      - key: HYPER_MCP_ADMIN_AUDIENCE
        value: hyper-mcp
      - key: HYPER_MCP_ADMIN_KID
        sync: false
      - key: HYPER_MCP_JWKS_CACHE_SECONDS
        value: "300"
      - key: HYPER_MCP_BACKEND
        value: pglite
      # Resource limits (defaults shown; override to tighten for your workload)
      - key: HYPER_MCP_MAX_CACHE_BYTES
        value: "1048576"      # 1 MiB cache value cap
      - key: HYPER_MCP_MAX_BLOB_BYTES
        value: "104857600"    # 100 MiB blob cap
      - key: HYPER_MCP_MAX_DATA_PAGE_SIZE
        value: "1000"         # data_find page ceiling
      - key: HYPER_MCP_MAX_BLOB_LIST_PAGE_SIZE
        value: "1000"         # blob_list page ceiling
      - key: HYPER_MCP_MAX_QUEUE_POLL_BATCH
        value: "10000"        # queue_poll batch ceiling
      - key: HYPER_MCP_MAX_SEARCH_PAGE_SIZE
        value: "10000"        # search_query page ceiling
    disk:
      name: hyper-mcp-pglite
      mountPath: /var/data
      sizeGB: 1